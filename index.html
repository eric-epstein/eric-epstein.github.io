<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tectra Energy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy-deep:   #06111f;
      --navy-mid:    #0a1e35;
      --navy-light:  #0f2a47;
      --gold:        #c8883a;
      --gold-light:  #e8a84a;
      --gold-glow:   rgba(200, 136, 58, 0.25);
      --cream:       #f0e8d8;
      --white:       #ffffff;
      --text-dim:    rgba(240, 232, 216, 0.6);
    }

    html, body {
      width: 100%;
      min-height: 100vh;
      background: var(--navy-deep);
      color: var(--cream);
      font-family: 'Outfit', sans-serif;
      overflow-x: hidden;
    }

    /* ── Background atmosphere ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 10% 40%, rgba(10, 40, 80, 0.8) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 80% 60%, rgba(15, 30, 55, 0.6) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Subtle animated wave lines mimicking the slide */
    .wave-bg {
      position: absolute;
      top: 0; left: 0;
      width: 55%;
      height: 100%;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }
    .wave-bg svg {
      width: 100%;
      height: 100%;
      opacity: 0.18;
    }

    /* ── Layout ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header / Nav ── */
    header {
      padding: 2rem 3rem 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.5rem, 3vw, 2rem);
      font-weight: 400;
      letter-spacing: 0.01em;
      color: var(--cream);
      line-height: 1;
    }
    .logo em {
      font-style: italic;
      font-weight: 400;
      color: var(--cream);
    }

    /* ── Hero ── */
    .hero {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      gap: 2rem;
      padding: 3rem 3rem 2rem;
      min-height: 70vh;
    }

    .hero-text {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      animation: fadeUp 0.9s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero-headline {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: clamp(2.8rem, 6vw, 5.5rem);
      line-height: 1.05;
      color: var(--cream);
      letter-spacing: -0.02em;
    }

    /* ── Hero image ── */
    .hero-image {
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeUp 0.9s 0.2s ease both;
    }

    .hero-image-crop {
      width: 100%;
      max-width: 520px;
      border-radius: 1.25rem;
      overflow: hidden;
      filter: drop-shadow(0 0 50px rgba(200, 136, 58, 0.2));
    }

    .hero-image-crop img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ── Feature strip ── */
    .features {
      border-top: 1px solid rgba(200, 136, 58, 0.2);
      padding: 1.8rem 3rem;
      display: flex;
      gap: 1rem;
      align-items: stretch;
      flex-wrap: wrap;
      animation: fadeUp 0.9s 0.4s ease both;
    }

    .feature {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex: 1;
      min-width: 200px;
      padding: 0.5rem 1rem 0.5rem 0;
    }

    .feature:not(:last-child) {
      border-right: 1px solid rgba(200, 136, 58, 0.15);
      padding-right: 2rem;
    }

    .feature-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1.5px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--gold);
    }

    .feature-icon svg {
      width: 20px;
      height: 20px;
      stroke: var(--gold);
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .feature-label {
      font-size: clamp(0.85rem, 1.5vw, 1rem);
      font-weight: 400;
      color: var(--cream);
      line-height: 1.3;
    }

    /* ── Footer note ── */
    .footer-note {
      text-align: center;
      padding: 1rem 3rem 1.5rem;
      font-size: 0.82rem;
      color: var(--text-dim);
      font-weight: 300;
      letter-spacing: 0.04em;
      animation: fadeUp 0.9s 0.5s ease both;
    }

    /* ── MOBILE ── */
    @media (max-width: 700px) {
      header { padding: 1.5rem 1.5rem 0; }

      .hero {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
        padding: 2rem 1.5rem 1.5rem;
        min-height: unset;
        gap: 1.5rem;
      }

      .hero-image {
        order: -1; /* image on top on mobile */
      }

      .hero-image-crop {
        border-radius: 0.75rem;
        max-width: 100%;
      }

      .hero-headline {
        font-size: clamp(2.4rem, 11vw, 3.5rem);
        text-align: center;
      }

      .hero-text { align-items: center; }

      .features {
        padding: 1.5rem;
        flex-direction: column;
        gap: 1.2rem;
      }

      .feature:not(:last-child) {
        border-right: none;
        border-bottom: 1px solid rgba(200, 136, 58, 0.15);
        padding-right: 0;
        padding-bottom: 1.2rem;
      }

      .footer-note { padding: 0.8rem 1.5rem 1.2rem; }
    }

    @media (min-width: 701px) and (max-width: 1024px) {
      header { padding: 1.8rem 2rem 0; }
      .hero { padding: 2rem 2rem 1.5rem; gap: 1.5rem; }
      .features { padding: 1.5rem 2rem; }
    }
  </style>
</head>
<body>
<div class="page">

  <!-- Animated wave background (replicates the slide's particle wave) -->
  <div class="wave-bg">
    <svg viewBox="0 0 600 700" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <style>
          .wave { fill: none; stroke: #3a7bd5; stroke-width: 1; opacity: 0; animation: waveIn 2s ease forwards; }
          .wave:nth-child(1) { animation-delay: 0.1s; }
          .wave:nth-child(2) { animation-delay: 0.3s; }
          .wave:nth-child(3) { animation-delay: 0.5s; }
          .wave:nth-child(4) { animation-delay: 0.7s; }
          .wave:nth-child(5) { animation-delay: 0.9s; }
          .wave:nth-child(6) { animation-delay: 1.1s; }
          @keyframes waveIn { to { opacity: 1; } }
        </style>
      </defs>
      <path class="wave" d="M-50,200 Q150,100 300,280 T650,200"/>
      <path class="wave" d="M-50,240 Q120,140 280,320 T650,240"/>
      <path class="wave" d="M-50,280 Q100,180 260,360 T650,280" stroke-width="1.5"/>
      <path class="wave" d="M-50,320 Q80,220 240,400 T650,320" stroke-width="2" stroke="#4a8be5"/>
      <path class="wave" d="M-50,360 Q60,260 220,440 T650,360"/>
      <path class="wave" d="M-50,400 Q40,300 200,480 T650,400"/>
    </svg>
  </div>

  <header>
    <div class="logo">Tectra <em>Energy</em></div>
  </header>

  <section class="hero">
    <div class="hero-text">
      <h1 class="hero-headline">More energy,<br>by design</h1>
    </div>
    <div class="hero-image">
      <!-- Crop wrapper: shows only the right ~55% of the slide (the battery render) -->
      <div class="hero-image-crop">
        <img src="landingpage2.png" alt="Tectra battery architecture render">
      </div>
    </div>
  </section>

  <div class="features">
    <div class="feature">
      <div class="feature-icon">
        <!-- Lightning bolt -->
        <svg viewBox="0 0 24 24"><polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      </div>
      <span class="feature-label">New battery architecture</span>
    </div>
    <div class="feature">
      <div class="feature-icon">
        <!-- Layers / scale -->
        <svg viewBox="0 0 24 24"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
      </div>
      <span class="feature-label">Designed for scale</span>
    </div>
    <div class="feature">
      <div class="feature-icon">
        <!-- Shield check -->
        <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>
      </div>
      <span class="feature-label">Built with safe &amp; abundant materials</span>
    </div>
  </div>

  <p class="footer-note">Private. In development.</p>

</div>
</body>
</html>
