<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tectra Energy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:     #c8883a;
      --cream:    #f0e8d8;
      --text-dim: rgba(240, 232, 216, 0.55);
    }

    html, body {
      width: 100%;
      min-height: 100vh;
      background: #0b1929;
      color: var(--cream);
      font-family: 'Outfit', sans-serif;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url('ChatGPT Image Apr 29, 2026, 07_23_14 AM.png');
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 2rem 3rem 0;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.5rem, 3vw, 2rem);
      font-weight: 400;
      letter-spacing: 0.01em;
      color: var(--cream);
      line-height: 1;
    }
    .logo em { font-style: italic; }

    .hero {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      padding: 3rem 3rem 2rem;
      min-height: 70vh;
    }

    .hero-text {
      animation: fadeUp 0.9s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero-headline {
      font-weight: 800;
      font-size: clamp(2.8rem, 6vw, 5.5rem);
      line-height: 1.05;
      color: var(--cream);
      letter-spacing: -0.02em;
    }

    .features {
      border-top: 1px solid rgba(200, 136, 58, 0.2);
      padding: 1.8rem 3rem;
      display: flex;
      gap: 1rem;
      align-items: stretch;
      flex-wrap: wrap;
      animation: fadeUp 0.9s 0.3s ease both;
    }

    .feature {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex: 1;
      min-width: 200px;
      padding: 0.5rem 2rem 0.5rem 0;
    }

    .feature:not(:last-child) {
      border-right: 1px solid rgba(200, 136, 58, 0.15);
    }

    .feature-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1.5px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .feature-icon svg {
      width: 20px;
      height: 20px;
      stroke: var(--gold);
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .feature-label {
      font-size: clamp(0.85rem, 1.5vw, 1rem);
      font-weight: 400;
      color: var(--cream);
      line-height: 1.3;
    }

    .footer-note {
      text-align: center;
      padding: 1rem 3rem 1.5rem;
      font-size: 0.82rem;
      color: var(--text-dim);
      font-weight: 300;
      letter-spacing: 0.04em;
      animation: fadeUp 0.9s 0.5s ease both;
    }

    @media (max-width: 700px) {
      header { padding: 1.5rem 1.5rem 0; }

      .hero {
        grid-template-columns: 1fr;
        padding: 2rem 1.5rem 1.5rem;
        min-height: unset;
      }

      .hero-text {
        background: rgba(5, 15, 30, 0.5);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        border-radius: 1rem;
        padding: 1.5rem;
      }

      .hero-headline { font-size: clamp(2.4rem, 11vw, 3.5rem); }

      .features {
        padding: 1.5rem;
        flex-direction: column;
        gap: 1.2rem;
        background: rgba(5, 15, 30, 0.5);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
      }

      .feature:not(:last-child) {
        border-right: none;
        border-bottom: 1px solid rgba(200, 136, 58, 0.15);
        padding-right: 0;
        padding-bottom: 1.2rem;
      }

      .footer-note { padding: 0.8rem 1.5rem 1.2rem; }
    }

    @media (min-width: 701px) and (max-width: 1024px) {
      header { padding: 1.8rem 2rem 0; }
      .hero { padding: 2rem 2rem 1.5rem; }
      .features { padding: 1.5rem 2rem; }
    }
  </style>
</head>
<body>
<div class="page">

  <header>
    <div class="logo">Tectra <em>Energy</em></div>
  </header>

  <section class="hero">
    <div class="hero-text">
      <h1 class="hero-headline">More energy,<br>by design</h1>
    </div>
  </section>

  <div class="features">
    <div class="feature">
      <div class="feature-icon">
        <svg viewBox="0 0 24 24"><polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      </div>
      <span class="feature-label">New battery architecture</span>
    </div>
    <div class="feature">
      <div class="feature-icon">
        <svg viewBox="0 0 24 24"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
      </div>
      <span class="feature-label">Designed for scale</span>
    </div>
    <div class="feature">
      <div class="feature-icon">
        <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>
      </div>
      <span class="feature-label">Built with safe &amp; abundant materials</span>
    </div>
  </div>

  <p class="footer-note">Private. In development.</p>

</div>
</body>
</html>
